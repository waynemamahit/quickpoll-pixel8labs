  ## Project Conventions

  ### Code Style

  #### TypeScript Standards

  - **Strict mode enabled** — `strict: true` in all tsconfig files
  - **No `any` type** — Use proper types, `unknown`, generics, or type narrowing
  - **Explicit return types** — All exported functions must have explicit return types
  - **Interface-first design** — Define interfaces before implementations
  - **Proper type organization** — Centralize types in dedicated `types/` directories
  - **`verbatimModuleSyntax`** — Use explicit `import type` for type-only imports
  - **No implicit any** — `noImplicitAny: true` enforced via strict mode

  ```typescript
  // ✅ CORRECT: Explicit types, interface-based, type-only imports
  import type { User, CreateUserInput } from "~/types/user.types";

  interface UserService {
    findById(id: string): Promise<User | null>;
    create(data: CreateUserInput): Promise<User>;
  }

  // ❌ WRONG: any type, implicit returns, no type imports
  function getUser(id: any) {
    return db.query(id);
  }
  ```

  #### Type Organization

  ```
  app/types/           # Frontend-specific types
  server/types/        # Backend-specific types
  shared/types/        # Shared types (frontend + backend)
  ```

  - **Interfaces** — For object shapes, service contracts, and DI bindings
  - **Types** — For unions, intersections, mapped types, and aliases
  - **Enums** — Prefer `as const` objects or string literal unions over enums
  - **Classes** — Only when behavior encapsulation is needed (e.g., Durable Objects, DI services)

  ```typescript
  // ✅ PREFERRED: const object over enum
  export const UserStatus = {
    Active: "active",
    Inactive: "inactive",
    Suspended: "suspended",
  } as const;
  export type UserStatus = (typeof UserStatus)[keyof typeof UserStatus];

  // ⚠️ ACCEPTABLE: Only when needed at runtime
  export const enum UserRole {
    Admin = "admin",
    User = "user",
  }
  ```

  #### Naming Conventions

  | Element          | Convention              | Example                       |
  | ---------------- | ----------------------- | ----------------------------- |
  | **Files**        | `kebab-case.ts`         | `user-profile.tsx`            |
  | **Components**   | `PascalCase`            | `UserProfile`                 |
  | **Functions**    | `camelCase`             | `getUserById`                 |
  | **Variables**    | `camelCase`             | `userName`                    |
  | **Constants**    | `SCREAMING_SNAKE_CASE`  | `MAX_RETRY_COUNT`             |
  | **Interfaces**   | `PascalCase` (no `I` prefix) | `UserService`            |
  | **Types**        | `PascalCase`            | `UserRole`                    |
  | **Enums/Const**  | `PascalCase`            | `UserStatus.Active`           |
  | **DO Classes**   | `PascalCase`            | `Counter`                     |

  #### Import Order (enforced by Biome.js `organizeImports`)

  1. Node.js built-ins (`node:*`)
  2. External packages (`react`, `hono`, `zod`, etc.)
  3. Internal aliases (`~/`, `@/`)
  4. Relative imports (`./`, `../`)
  5. Type-only imports (`import type { ... }`)

  ### Formatting Rules (Biome.js)

  Configured in `biome.json`:

  - **Indent**: 2 spaces
  - **Quotes**: Double quotes for strings
  - **Semicolons**: Always (inferred by Biome default)
  - **Trailing commas**: All (Biome default)
  - **Import organization**: Automatic via `organizeImports: "on"`
  - **Domains**: React rules enabled (`"react": "recommended"`)
  - **CSS**: TailwindCSS directives parsing enabled

  ```jsonc
  // biome.json — CORRECT configuration (fix both includes/ignores AND schema version)
  {
    "$schema": "https://biomejs.dev/schemas/2.4.16/schema.json",
    "files": {
      "ignoreUnknown": false,
      "ignores": ["coverage", "node_modules", "build", ".mf", ".wrangler"],
      "includes": ["**/*.{ts,tsx,js,jsx,json,jsonc,md,mdx,html,css,yml,yaml}"]
    }
  }
  ```

