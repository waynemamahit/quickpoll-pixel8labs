  ## Logging & Error Handling

  ### Logger Service (Core Feature)

  - **Correlation ID** — Assigned per request, propagated through all service calls
  - **Sensitive data sanitization** — Automatic redaction before logging
  - **Structured logging** — JSON format for production, readable for development
  - **Request/Response logging** — All API calls logged with timing and status
  - **Registered in DI container** — Available to all services and engines

  ```typescript
  interface ILoggerService {
    info(message: string, meta?: Record<string, unknown>): void;
    error(message: string, error?: Error, meta?: Record<string, unknown>): void;
    warn(message: string, meta?: Record<string, unknown>): void;
    debug(message: string, meta?: Record<string, unknown>): void;
    setCorrelationId(id: string): void;
    getCorrelationId(): string;
  }
  ```

  **Sensitive Fields (Auto-Sanitized):**

  - `password`, `token`, `secret`, `apiKey`, `authorization`
  - `creditCard`, `ssn`, `pin`, `cvv`
  - Any field matching `/password|token|secret|key|auth|credit|ssn|bearer/i`
  - Applied to both request payloads and response data

  ### Global Error Handling (Core Feature)

  - **Automatic error catching** — Hono `onError` handler catches all unhandled errors
  - **Error logging** — Errors logged with correlation ID, stack trace, and request context
  - **Production-safe responses** — Only `correlationId` and generic message exposed to clients
  - **Structured error responses** — Consistent JSON error format across all API endpoints
  - **Easy debugging** — Use correlation ID to trace full request lifecycle in logs

  ```typescript
  // server/middleware/error-handler.ts
  export const errorHandler = (
    err: Error,
    c: Context,
    logger: ILoggerService
  ): Response => {
    const correlationId = logger.getCorrelationId();

    logger.error("Unhandled error", err, {
      correlationId,
      path: c.req.path,
      method: c.req.method,
    });

    return c.json(
      {
        error: "Internal Server Error",
        correlationId,
      },
      500
    );
  };
  ```

