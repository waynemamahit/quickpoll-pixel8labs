context: |
  # Project Context

  ## Purpose

  A production-ready full-stack starter template built on **React Router v8 (Framework Mode)** with **Cloudflare Workers**. This project provides a scalable foundation for building modern web applications with SSR, comprehensive Cloudflare service integrations, clean architecture following SOLID principles, and specification-driven development with OpenSpec.

  **Goals:**

  - Provide a robust, type-safe development experience with zero tolerance for `any` types
  - Enable rapid feature development with clean architecture patterns (Engine/Facade + Service layers)
  - Ensure high code quality through comprehensive testing (90%+ coverage across unit, integration, and E2E)
  - Support internationalization (i18next) and accessibility (ARIA, semantic HTML) out of the box
  - Leverage Cloudflare's edge computing capabilities (D1, Hyperdrive, KV, R2, Durable Objects, Vectorize, Workers AI, Browser Rendering)
  - Implement security best practices (CSRF, CORS, rate limiting, secure headers, sensitive data sanitization)

  ---

