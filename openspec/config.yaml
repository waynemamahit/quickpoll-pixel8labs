  ## Schema Validation (Zod)

  - **Shared schemas** in `shared/schemas/` — used by both frontend and backend
  - **Frontend-specific schemas** in `app/schemas/` — form validation, UI state
  - **Backend-specific schemas** in `server/schemas/` — API request/response, DB operations
  - **Type inference** — Always derive TypeScript types from Zod schemas
  - **Validation at boundaries** — Validate at API input (Hono `@hono/zod-validator`) and form submissions

  ```typescript
  // shared/schemas/user.schema.ts
  import { z } from "zod";

  export const UserSchema = z.object({
    id: z.string().uuid(),
    email: z.string().email(),
    name: z.string().min(1).max(100),
  });

  export type User = z.infer<typeof UserSchema>;

  export const CreateUserSchema = UserSchema.omit({ id: true });
  export type CreateUserInput = z.infer<typeof CreateUserSchema>;
  ```

  ```typescript
  // ✅ Hono route with Zod validation
  import { zValidator } from "@hono/zod-validator";

  app.post("/users", zValidator("json", CreateUserSchema), async (c) => {
    const data = c.req.valid("json"); // Fully typed as CreateUserInput
    // ...
  });
  ```

  ---

  ## Database Patterns (Drizzle ORM)

  ### Separate Schemas

  - **D1 (SQLite)**: `db/d1/schema/` — edge-native, low-latency reads
  - **Hyperdrive (PostgreSQL)**: `db/hyperdrive/schema/` — connection-pooled external DB

  Each database has its own Drizzle config, schema directory, and migration directory. Never mix D1 and Hyperdrive schemas.

  ### Migration Strategy

  - **D1**: `db/d1/migrations/` — SQLite-compatible SQL
  - **Hyperdrive**: `db/hyperdrive/migrations/` — PostgreSQL-compatible SQL
  - **Always generate** before applying — review migration SQL before running

  ```bash
  # D1 Commands
  pnpm d1:generate      # Generate D1 migration from schema changes
  pnpm d1:migrate       # Apply D1 migrations (local Wrangler)
  pnpm d1:migrate:prod  # Apply D1 migrations (production)
  pnpm d1:studio        # Open D1 Drizzle Studio

  # Hyperdrive Commands
  pnpm db:generate      # Generate Hyperdrive migration from schema changes
  pnpm db:migrate       # Apply Hyperdrive migrations (local Docker PostgreSQL)
  pnpm db:migrate:prod  # Apply Hyperdrive migrations (production)
  pnpm db:studio        # Open Hyperdrive Drizzle Studio
  ```

  ### Best Practices

  - **Use indexes** — Define indexes for frequently queried columns
  - **Avoid N+1** — Use joins or batch queries via Drizzle's relational API
  - **Type-safe queries** — Never use raw SQL; use Drizzle's query builder
  - **Migration review** — Always review generated SQL before applying

  ### Local Development with Docker

  ```yaml
  # docker-compose.yml — PostgreSQL for Hyperdrive local development
  services:
    postgres:
      image: postgres:latest
      container_name: react-router-cf-starter-postgres
      environment:
        POSTGRES_USER: postgres
        POSTGRES_PASSWORD: postgres
        POSTGRES_DB: staging_db
      ports:
        - "5432:5432"
      volumes:
        - postgres-data:/var/lib/postgresql
      healthcheck:
        test: ["CMD-SHELL", "pg_isready -U postgres -d staging_db"]
        interval: 10s
        timeout: 5s
        retries: 5
      restart: unless-stopped

  volumes:
    postgres-data:
      driver: local
  ```

  **Hyperdrive local connection** (configured in `wrangler.jsonc`):

  ```jsonc
  "hyperdrive": [{
    "binding": "HYPERDRIVE",
    "id": "${HYPERDRIVE_DB_ID}",
    "localConnectionString": "postgres://postgres:postgres@127.0.0.1:5432/staging_db"
  }]
  ```

