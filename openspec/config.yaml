  ## Testing Strategy

  ### Coverage Requirements

  - **Minimum coverage: 90%** for all metrics (statements, branches, functions, lines)
  - **All tests must pass** before merging to `main` or `dev`
  - **No skipped tests** in production branches
  - **Coverage enforced** via Vitest v8 coverage provider with `thresholds` config

  > **⚠️ IMPORTANT:** The current `vitest.config.ts` is missing the `thresholds` block.
  > The coverage thresholds MUST be added to enforce the 90% minimum. Without `thresholds`,
  > Vitest will report coverage but will NOT fail the build when coverage drops below 90%.

  ```typescript
  // vitest.config.ts — enforce 90% coverage thresholds
  export default defineConfig({
    plugins: [react()],
    resolve: {
      tsconfigPaths: true,
    },
    test: {
      globals: true,
      environment: "jsdom",
      setupFiles: ["./vitest.setup.ts"],
      exclude: ["node_modules/", "coverage/", "dist/", "e2e/", "vitest.setup.ts"],
      coverage: {
        provider: "v8",
        reporter: ["text", "json", "html"],
        thresholds: {
          statements: 90,
          branches: 90,
          functions: 90,
          lines: 90,
        },
        exclude: ["node_modules/", "coverage/", "dist/", "e2e/", "vitest.setup.ts"],
      },
    },
  });
  ```

  ### Test Types and Tools

  | Type              | Tool                     | File Pattern                   | Scope                          |
  | ----------------- | ------------------------ | ------------------------------ | ------------------------------ |
  | **Unit**          | Vitest + RTL             | `*.test.ts`, `*.test.tsx`      | Components, services, utils    |
  | **Integration**   | Vitest + Hono test client| `*.integration.test.ts`        | API endpoints, feature flows   |
  | **End-to-End**    | Playwright               | `e2e/*.spec.ts`                | Full user flows across browsers|

  ### Unit Testing (Vitest)

  - **Environment**: jsdom (via `vitest.config.ts`)
  - **Setup**: `vitest.setup.ts` with `@testing-library/jest-dom` matchers
  - **Component testing**: React Testing Library with `render`, `screen`, `userEvent`
  - **Service testing**: Mock dependencies via DI interfaces
  - **Schema testing**: Validate Zod schemas with valid and invalid inputs

  ### Integration Testing (Vitest + Hono)

  - **API testing**: Use Hono's `app.request()` test helper
  - **Database mocking**: Mock Drizzle ORM queries at the service interface level
  - **External service mocking**: Mock Cloudflare bindings (D1, KV, R2, etc.) via typed interfaces
  - **CSRF verification**: Test that mutations are rejected without valid origin
  - **CORS verification**: Test that cross-origin requests are handled correctly
  - **Error handling**: Test that server errors return proper correlation IDs

  ### End-to-End Testing (Playwright)

  - **Configuration**: `playwright.config.ts` with multi-browser support
  - **Test directory**: `e2e/`
  - **Browsers**: Chromium, Firefox, WebKit (configured per CI/local)
  - **Parallel execution**: Enabled locally, sequential on CI
  - **CI retries**: 2 retries on CI, 0 locally
  - **Reporter**: HTML report for visual debugging

  > **⚠️ IMPORTANT:** The current `playwright.config.ts` is missing the `use.baseURL` and
  > `webServer` block (both are commented out). These MUST be uncommented and configured
  > for Playwright to automatically start the dev server and resolve relative URLs.

  ```typescript
  // playwright.config.ts — correct configuration
  export default defineConfig({
    testDir: "./e2e",
    fullyParallel: true,
    forbidOnly: !!process.env.CI,
    retries: process.env.CI ? 2 : 0,
    workers: process.env.CI ? 1 : undefined,
    reporter: "html",
    use: {
      baseURL: "http://localhost:5173",
      trace: "on-first-retry",
    },
    projects: [
      { name: "chromium", use: { ...devices["Desktop Chrome"] } },
      { name: "firefox", use: { ...devices["Desktop Firefox"] } },
      { name: "webkit", use: { ...devices["Desktop Safari"] } },
    ],
    webServer: {
      command: "pnpm dev",
      url: "http://localhost:5173",
      reuseExistingServer: !process.env.CI,
    },
  });
  ```

  ### Playwright E2E Data Prefix Convention

  **All data input in Playwright E2E tests MUST use the prefix `from Playwright-E2E`.**

  This convention ensures that developers can easily distinguish between data created by
  automated E2E tests and data created manually during development. This prevents false
  confidence from manually seeded data being confused with Playwright-generated data.

  **Rules:**

  - Every text input, form field, and data creation action MUST prefix values with `from Playwright-E2E`
  - This applies to: names, titles, descriptions, emails, and any user-generated content
  - Use a helper function to standardize the prefix across all E2E tests
  - During manual testing, developers can filter/identify E2E-created data by searching for this prefix

  ```typescript
  // e2e/helpers/test-data.ts — centralized E2E data prefix helper
  const E2E_PREFIX = "from Playwright-E2E";

  export function e2eData(value: string): string {
    return `${E2E_PREFIX} ${value}`;
  }

  export function e2eEmail(name: string): string {
    return `playwright-e2e-${name}@test.local`;
  }

  // ✅ CORRECT: Using e2eData helper in tests
  // e2e/users.spec.ts
  import { e2eData, e2eEmail } from "./helpers/test-data";

  test("create a new user", async ({ page }) => {
    await page.getByLabel("Name").fill(e2eData("John Doe"));
    await page.getByLabel("Email").fill(e2eEmail("john-doe"));
    await page.getByLabel("Bio").fill(e2eData("Software engineer"));
    await page.getByRole("button", { name: "Submit" }).click();
    // Asserts
    await expect(page.getByText(e2eData("John Doe"))).toBeVisible();
  });

  // ❌ WRONG: Hardcoded data without prefix
  test("create a new user", async ({ page }) => {
    await page.getByLabel("Name").fill("John Doe"); // Missing prefix!
  });
  ```

