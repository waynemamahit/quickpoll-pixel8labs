  ## UI/UX Patterns

  ### Semantic HTML & Accessibility

  - **Semantic elements**: `<main>`, `<nav>`, `<article>`, `<section>`, `<header>`, `<footer>`, `<aside>`
  - **ARIA roles**: Proper roles for interactive elements, live regions for dynamic content
  - **Keyboard navigation**: All interactions keyboard-accessible (Tab, Enter, Escape, Arrow keys)
  - **Focus management**: Visible focus indicators, focus trapping in modals
  - **Screen reader support**: Descriptive labels, `aria-label`, `aria-describedby`, `aria-live`
  - **Skip links**: "Skip to main content" link as first focusable element
  - **Color contrast**: Minimum WCAG 2.1 AA contrast ratios via DaisyUI theme tokens
  - **Landmark regions**: Proper landmark structure for assistive technology

  ```tsx
  // ✅ CORRECT: Semantic HTML with ARIA
  <a href="#main-content" className="sr-only focus:not-sr-only">
    Skip to main content
  </a>
  <header role="banner">
    <nav aria-label="Primary navigation">
      {/* Navigation items */}
    </nav>
  </header>
  <main id="main-content" role="main" aria-label="Main content">
    <section aria-labelledby="section-heading">
      <h2 id="section-heading">Section Title</h2>
      {/* Content */}
    </section>
  </main>
  <footer role="contentinfo">
    {/* Footer content */}
  </footer>
  ```

  ### Form Layouts

  - Follow [TailwindCSS Form Layouts](https://tailwindcss.com/plus/ui-blocks/application-ui/forms/form-layouts)
  - **Mobile-first responsive**: Stack on mobile, grid on desktop
  - **Proper label associations**: `<label htmlFor="...">` on every input
  - **Error state handling**: Clear inline error messages with `aria-invalid` and `aria-describedby`
  - **Loading states**: Visual feedback with disabled state and spinner
  - **Validation**: Client-side Zod validation + server-side validation in actions
  - **CSRF token**: Hidden field or header for all mutation forms

  ```tsx
  // Responsive form layout with TailwindCSS + DaisyUI
  <form className="space-y-8 divide-y divide-base-300" method="post">
    <div className="md:grid md:grid-cols-3 md:gap-6">
      <div className="md:col-span-1">
        <h3 className="text-lg font-medium text-base-content">Profile</h3>
        <p className="mt-1 text-sm text-base-content/60">
          This information will be displayed publicly.
        </p>
      </div>
      <div className="mt-5 md:col-span-2 md:mt-0 space-y-4">
        <div className="form-control w-full">
          <label className="label" htmlFor="name">
            <span className="label-text">Full Name</span>
          </label>
          <input
            id="name"
            name="name"
            type="text"
            className="input input-bordered w-full"
            aria-invalid={!!errors?.name}
            aria-describedby={errors?.name ? "name-error" : undefined}
          />
          {errors?.name && (
            <p id="name-error" className="text-error text-sm mt-1" role="alert">
              {errors.name}
            </p>
          )}
        </div>
      </div>
    </div>
  </form>
  ```

