  ## Important Constraints

  ### Technical Constraints

  1. **TypeScript Strictness**
    - No `any` type usage — enforced by Biome linting and `strict: true`
    - Strict null checks enabled
    - Explicit return types on all exported functions
    - `verbatimModuleSyntax` — explicit `import type` required

  2. **Test Coverage**
    - Minimum 90% coverage enforced (statements, branches, functions, lines)
    - All unit and integration tests must pass before merge
    - E2E tests must pass on CI before production deploy
    - No skipped tests in production branches
    - **Playwright E2E data prefix**: All E2E test data inputs MUST use `from Playwright-E2E` prefix

  3. **Architecture Compliance**
    - Follow clean architecture layers (Routes → Engine → Service)
    - No unnecessary abstraction layers — only Engine and Service
    - Interface-based dependency injection via Awilix
    - DI container per context (frontend + backend)

  4. **Security Requirements**
    - CSRF protection on all mutation endpoints (Hono `csrf()` middleware)
    - CORS with configurable origins from `wrangler.jsonc` vars
    - Rate limiting via Cloudflare RateLimit bindings
    - Secure headers via `hono/secure-headers`
    - Sensitive data sanitization in all log output
    - No hardcoded credentials — use `.dev.vars` and Wrangler secrets

  5. **Cloudflare Compatibility**
    - All code must run on the Workers runtime
    - No Node.js-specific APIs unless polyfilled via `nodejs_compat` flag
    - Edge-compatible dependencies only
    - Wrangler types auto-generated via `wrangler types` command
    - All bindings typed in `worker-configuration.d.ts`

  6. **Accessibility Requirements**
    - Semantic HTML structure on all pages
    - ARIA roles and attributes on all interactive elements
    - Keyboard navigation support (Tab, Enter, Escape, arrows)
    - Skip links on all pages
    - Focus management in modals and dynamic content
    - WCAG 2.1 AA color contrast compliance

  7. **Internationalization Requirements**
    - All user-facing strings must use i18n keys (no hardcoded text)
    - Frontend: `react-i18next` with JSON translation files per namespace
    - Backend: `i18next` for API error messages and notifications
    - Language persisted in localStorage + cookie (for SSR detection)
    - Minimum languages: English (`en`), Indonesian (`id`)

  ### Performance Constraints

  1. **Bundle Size** — Monitor and optimize frontend bundle via Vite build analysis
  2. **Cold Start** — Optimize Worker initialization (lazy imports, minimal top-level code)
  3. **Database Queries** — Use indexes, avoid N+1 queries, leverage Drizzle query builder
  4. **Edge Caching** — Use KV for frequently accessed data, R2 for static assets

