  ## Architecture Patterns

  ### Clean Architecture Overview

  ```
  ┌─────────────────────────────────────────────────────────────┐
  │                    Routes / Controllers                      │
  │              (React Router loaders+actions / Hono routes)    │
  └──────────────────────────┬──────────────────────────────────┘
                             │ calls
  ┌──────────────────────────▼──────────────────────────────────┐
  │                   Engine / Facade Layer                      │
  │         (Business logic, orchestrates 2+ services)           │
  │                                                              │
  │   • Coordinates multiple services                            │
  │   • Contains business rules and validation                   │
  │   • Transaction boundaries                                   │
  │   • ONLY create when orchestrating 2+ services               │
  │   • Can be shared between frontend and backend if portable   │
  └──────────────────────────┬──────────────────────────────────┘
                             │ delegates
  ┌──────────────────────────▼──────────────────────────────────┐
  │                      Service Layer                           │
  │           (Direct integration with external systems)         │
  │                                                              │
  │   Backend: D1Service │ HyperdriveService │ KVService │       │
  │            R2Service │ DOService │ VectorizeService │         │
  │            AIService │ LoggerService │ AuthService            │
  │                                                              │
  │   Frontend: APIService │ OAuthService │ PaymentService │     │
  │             MapService │ SmartContractService                │
  │                                                              │
  └─────────────────────────────────────────────────────────────┘
  ```

  ### Layer Discipline Rules

  **Routes/Controllers:**

  - React Router: `loader`/`action` functions for data fetching and mutations
  - Hono: Route handlers under `server/routes/v1/`
  - Thin layer — delegates to engines or services, no business logic

  **Engine/Facade Layer:**

  - Contains business logic and orchestration
  - Coordinates 2+ services with shared business rules
  - Handles transaction boundaries and cross-cutting concerns
  - **ONLY create when needed** — do not create unnecessary engine layers
  - Can be shared between frontend and backend if logic is portable

  **Service Layer:**

  - Direct integration with external services — no business logic
  - Pure data access and manipulation
  - Backend services: D1, Hyperdrive, KV, R2, Durable Objects, Vectorize, Workers AI
  - Frontend services: API calls, OAuth, Payment Gateways, Maps, Smart Contracts, third-party libraries

  **Creation Rules:**

  ```
  ✅ Create Engine: When orchestrating 2+ services with business logic
  ✅ Create Service: For each external integration point
  ❌ Don't Create: Unnecessary abstraction layers
  ❌ Don't Create: Engine that just proxies a single service
  ❌ Don't Create: Extra layers beyond engine + service
  ```

  ### Dependency Injection (Awilix)

  Follow the [official Awilix guide](https://github.com/jeffijoe/awilix/blob/master/README.md) for implementation.

  **Key Principles:**

  - **Interface-based contracts** — All services MUST implement interfaces
  - **Container registration** — Use `asClass` or `asFunction` with proper lifetime
  - **Scoped containers** — Request-scoped for API handlers (inject `Env` per request)
  - **Testability** — Easy mocking through interface substitution
  - **Separate containers** — `app/containers/` for frontend, `server/containers/` for backend

  ```typescript
  // ✅ CORRECT: Interface-based DI with typed dependencies
  interface IUserService {
    findById(id: string): Promise<User | null>;
  }

  class UserService implements IUserService {
    constructor(private deps: { db: ID1Service }) {}

    async findById(id: string): Promise<User | null> {
      return this.deps.db.queryUser(id);
    }
  }

  // Container registration (server/containers/index.ts)
  import { createContainer, asClass } from "awilix";

  const container = createContainer();
  container.register({
    userService: asClass(UserService).scoped(),
  });
  ```

  ### SOLID Principles Application

  - **S**ingle Responsibility — Each service/engine has one clear purpose
  - **O**pen/Closed — Extend via interfaces, not modification; new features via new services
  - **L**iskov Substitution — All implementations are interchangeable via interfaces
  - **I**nterface Segregation — Small, focused interfaces (not one large interface)
  - **D**ependency Inversion — Depend on abstractions (interfaces), not concretions (classes)

