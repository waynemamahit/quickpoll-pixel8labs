  ## Realtime Features

  ### WebSocket / SSE Selection Guide

  - Use **Durable Objects** for all stateful realtime connections
  - Use **KV** for communication between Durable Object instances (queue coordination)
  - Choose protocol based on requirements:

  | Feature             | WebSocket                        | SSE                              |
  | ------------------- | -------------------------------- | -------------------------------- |
  | **Direction**       | Bidirectional                    | Server → Client only             |
  | **Complexity**      | Higher (DO + WebSocketPair)      | Lower (ReadableStream)           |
  | **Use Cases**       | Chat, live collaboration, gaming | Notifications, feed updates      |
  | **Reconnection**    | Manual                           | Automatic (EventSource API)      |
  | **Binary Data**     | Supported                        | Text only (JSON)                 |
  | **Browser Support** | Excellent                        | Excellent                        |

  **Decision Rule:** Use SSE unless the client needs to send messages to the server. Use WebSocket for bidirectional communication.

  ### WebSocket Implementation (Durable Objects)

  ```typescript
  // server/durable_objects/websocket.do.ts
  export class WebSocketDO extends DurableObject {
    private sessions: Map<string, WebSocket> = new Map();

    async fetch(request: Request): Promise<Response> {
      if (request.headers.get("Upgrade") === "websocket") {
        const { 0: client, 1: server } = new WebSocketPair();
        const sessionId = crypto.randomUUID();
        this.ctx.acceptWebSocket(server);
        this.sessions.set(sessionId, server);
        return new Response(null, { status: 101, webSocket: client });
      }
      return new Response("Expected WebSocket", { status: 400 });
    }

    async webSocketMessage(ws: WebSocket, message: string | ArrayBuffer): Promise<void> {
      // Handle incoming messages, broadcast to other sessions
    }

    async webSocketClose(ws: WebSocket, code: number, reason: string): Promise<void> {
      // Clean up session
    }
  }
  ```

  ### Inter-DO Communication via KV

  - Durable Objects use KV to coordinate between instances
  - KV stores queue state, message routing, and session metadata
  - Pattern: DO writes to KV → other DOs poll or are notified

