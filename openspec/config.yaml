  ## Domain Context

  ### Application Domains

  This starter template is designed to support various application types:

  - **SaaS applications** — Multi-tenant with user management
  - **E-commerce** — Product catalogs, carts, checkout
  - **Content platforms** — CMS, blogs, documentation
  - **Real-time applications** — Chat, notifications, live updates
  - **AI-powered applications** — ML inference, embeddings, automation

  ### Cloudflare Edge Computing

  All services are configured in `wrangler.jsonc` and can be tested locally via Wrangler's local mode.

  **Key Concepts:**

  - **Workers** — Serverless functions at the edge (Hono + React Router SSR)
  - **D1** — SQLite at the edge, low-latency reads, Drizzle ORM managed
  - **Hyperdrive** — Connection pooling for external PostgreSQL, Docker for local dev
  - **Durable Objects** — Stateful edge computing for WebSocket, SSE, queues
  - **KV** — Global key-value storage for caching, sessions, inter-DO communication
  - **R2** — S3-compatible object storage, no egress fees
  - **Vectorize** — Vector database for ML embeddings, similarity search
  - **Workers AI** — ML inference at the edge for backend automation
  - **Browser Rendering** — Server-side browser automation for screenshots, PDFs
  - **Rate Limiter** — Edge-native request rate limiting via RateLimit bindings

  ### Cloudflare Service Selection Guide

  | Requirement                     | Service              | Why                                       |
  | ------------------------------- | -------------------- | ----------------------------------------- |
  | Primary edge data storage       | D1                   | Low-latency SQLite at edge                |
  | External PostgreSQL             | Hyperdrive           | Connection pooling, reduced latency       |
  | Caching, sessions               | KV                   | Global, fast key-value                    |
  | File/object storage             | R2                   | S3-compatible, no egress fees             |
  | Real-time bidirectional         | Durable Objects + WS | Stateful WebSocket connections            |
  | Real-time server push           | Durable Objects + SSE| One-way server-to-client updates          |
  | ML embeddings/similarity search | Vectorize            | Vector similarity search                  |
  | AI inference/automation         | Workers AI           | Edge ML models                            |
  | Inter-DO queue coordination     | KV + DO              | KV as message broker between DOs          |
  | Browser automation              | Browser Rendering    | Screenshots, PDF generation               |
  | API rate limiting               | RateLimit            | Edge-native, configurable per binding     |

