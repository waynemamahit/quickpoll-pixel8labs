  ### Mocking Strategy

  - **Database mocking** — Mock Drizzle ORM at the service interface level, not at the DB driver
  - **Cloudflare bindings** — Create typed mocks for D1, KV, R2, Hyperdrive, AI, Vectorize
  - **HTTP requests** — Use Vitest mocks (`vi.fn()`) for fetch-based services
  - **DI container** — Swap real services with mocks via Awilix container override
  - **No `any` type in mocks** — All mocks must satisfy their interface types

  ```typescript
  // ✅ CORRECT: Properly typed mock matching interface
  const mockUserService: IUserService = {
    findById: vi.fn<[string], Promise<User | null>>().mockResolvedValue(mockUser),
    create: vi.fn<[CreateUserInput], Promise<User>>().mockResolvedValue(mockUser),
  };

  // ✅ CORRECT: Cloudflare binding mock
  const mockKV: KVNamespace = {
    get: vi.fn().mockResolvedValue(null),
    put: vi.fn().mockResolvedValue(undefined),
    delete: vi.fn().mockResolvedValue(undefined),
    list: vi.fn().mockResolvedValue({ keys: [], list_complete: true, cacheStatus: null }),
    getWithMetadata: vi.fn().mockResolvedValue({ value: null, metadata: null, cacheStatus: null }),
  } as unknown as KVNamespace;

  // ❌ WRONG: any type in mock
  const mockService = {} as any;
  ```

