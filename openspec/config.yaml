  ## Security Patterns

  ### CSRF Protection

  - **Required for all mutations**: POST, PUT, PATCH, DELETE
  - Implemented via Hono's built-in `csrf()` middleware in `server/app.ts`
  - Origin-based validation — checks request origin against allowed origins
  - Applied globally before route handlers

  ```typescript
  // server/app.ts — CSRF applied globally
  import { csrf } from "hono/csrf";

  app.use(csrf({
    origin: (origin, c) => {
      const allowed = c.env.CORS_ALLOWED_ORIGINS?.split(",") ?? [];
      return allowed.includes(origin);
    },
  }));
  ```

  **Verification in tests:**

  - Integration tests MUST verify CSRF protection rejects requests without valid origin
  - Test both allowed and disallowed origins

  ### CORS Protection

  - **Configurable origins** via `CORS_ALLOWED_ORIGINS` in `wrangler.jsonc` vars
  - Applied to `/api/*` routes only (not SSR pages)
  - Supports comma-separated origin list for multiple domains

  ```jsonc
  // wrangler.jsonc — CORS origins configuration
  {
    "vars": {
      "CORS_ALLOWED_ORIGINS": "https://your-domain.com,https://api.your-domain.com"
    }
  }
  ```

  ```typescript
  // server/app.ts — CORS on API routes
  import { cors } from "hono/cors";

  app.use("/api/*", cors({
    origin: (origin, c) => {
      const allowed = c.env.CORS_ALLOWED_ORIGINS?.split(",") ?? [];
      return allowed.includes(origin) ? origin : "";
    },
    credentials: true,
    allowMethods: ["GET", "POST", "PUT", "PATCH", "DELETE", "OPTIONS"],
    allowHeaders: ["Content-Type", "Authorization", "X-Correlation-Id"],
  }));
  ```

  ### Rate Limiting

  - Configured via Cloudflare `RateLimit` bindings in `wrangler.jsonc`
  - Two tiers: `LONG_RATE_LIMITER` (100 req/60s) and `SHORT_RATE_LIMITER` (20 req/10s)
  - Applied via `hono-rate-limiter` middleware with `cf-connecting-ip` key

  ### Secure Headers

  - Applied globally via `hono/secure-headers` middleware
  - Includes CSP, X-Frame-Options, X-Content-Type-Options, etc.

  ### Sensitive Data Handling

  - **Never log sensitive data** — Logger service sanitizes automatically
  - **Environment variables** for secrets — use `.dev.vars` locally, Wrangler secrets in production
  - **No hardcoded credentials** in codebase
  - **Wrangler types** auto-generated — run `wrangler types` to update `worker-configuration.d.ts`

