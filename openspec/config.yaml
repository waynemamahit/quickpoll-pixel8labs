  ## Quick Reference

  ### Development Commands

  ```bash
  # Installation
  pnpm install                    # Install dependencies
  docker-compose up -d            # Start local PostgreSQL for Hyperdrive

  # Development
  pnpm dev                        # Start dev server (Vite + Wrangler)

  # Code Quality
  pnpm lint                       # Run Biome check + auto-fix
  pnpm typecheck                  # wrangler types + react-router typegen + tsc

  # Database
  pnpm d1:generate                # Generate D1 migrations from schema
  pnpm d1:migrate                 # Apply D1 migrations (local)
  pnpm d1:migrate:prod            # Apply D1 migrations (production)
  pnpm d1:studio                  # Open D1 Drizzle Studio
  pnpm db:generate                # Generate Hyperdrive migrations from schema
  pnpm db:migrate                 # Apply Hyperdrive migrations (local Docker)
  pnpm db:migrate:prod            # Apply Hyperdrive migrations (production)
  pnpm db:studio                  # Open Hyperdrive Drizzle Studio

  # Testing
  pnpm test                       # Run all Vitest tests
  pnpm test:ui                    # Vitest UI (browser)
  pnpm test:out                   # JSON test output
  pnpm test:e2e                   # Run Playwright E2E tests

  # Build & Deploy
  pnpm build                      # Production build (React Router + Vite)
  pnpm preview                    # Build + local Wrangler preview
  pnpm preview:remote             # Build + remote Wrangler preview
  ```

  ### File Naming Patterns

  | Pattern             | Example                                 |
  | ------------------- | --------------------------------------- |
  | Component           | `UserProfile.tsx`                       |
  | Component test      | `__tests__/UserProfile.test.tsx`        |
  | Service             | `user.service.ts`                       |
  | Service test        | `__tests__/user.service.test.ts`        |
  | Engine              | `auth.engine.ts`                        |
  | Engine test         | `__tests__/auth.engine.test.ts`         |
  | Schema              | `user.schema.ts`                        |
  | Type                | `user.types.ts`                         |
  | Route (React)       | `users.tsx`                             |
  | Route (Hono)        | `users.ts`                              |
  | Integration test    | `__tests__/*.integration.test.ts`       |
  | E2E test            | `e2e/*.spec.ts`                         |
  | Middleware          | `auth.middleware.ts`                    |
  | Hook                | `use-auth.ts`                           |
  | Utility             | `date.utils.ts`                         |
  | Durable Object      | `counter.do.ts`                         |
  | DI Container        | `containers/index.ts`                   |
  | i18n config         | `i18n/config.ts`                        |

  ### Environment Variables

  ```bash
  # .dev.vars (local development — NOT committed to git)
  CORS_ALLOWED_ORIGINS=http://localhost:5173
  DATABASE_URL=postgresql://postgres:postgres@127.0.0.1:5432/staging_db
  ```

  > **⚠️ IMPORTANT:** The current `wrangler.jsonc` vars section is missing the
  > `CORS_ALLOWED_ORIGINS` variable. It MUST be added to enable CORS/CSRF origin
  > checks at runtime. Without it, `c.env.CORS_ALLOWED_ORIGINS` will be `undefined`
  > and all origin-based security checks will fail.

  ```jsonc
  // wrangler.jsonc (production — committed, secrets via Wrangler CLI)
  {
    "vars": {
      "CORS_ALLOWED_ORIGINS": "https://your-domain.com,https://api.your-domain.com",
      "VALUE_FROM_CLOUDFLARE": "${VALUE_FROM_CLOUDFLARE}"
    }
  }
  ```

  ### Wrangler Bindings Summary

  All bindings are defined in `wrangler.jsonc` and auto-typed in `worker-configuration.d.ts`:

  | Binding              | Type                     | Config Key          | Local Dev Status       |
  | -------------------- | ------------------------ | ------------------- | ---------------------- |
  | `D1`                 | `D1Database`             | `d1_databases`      | ✅ Local via Wrangler  |
  | `HYPERDRIVE`         | `Hyperdrive`             | `hyperdrive`        | ✅ Docker PostgreSQL   |
  | `KV`                 | `KVNamespace`            | `kv_namespaces`     | ✅ Local via Wrangler  |
  | `R2`                 | `R2Bucket`               | `r2_buckets`        | ✅ Local via Wrangler  |
  | `DO_COUNTER`         | `DurableObjectNamespace` | `durable_objects`   | ✅ Local sqlite_classes|
  | `VECTORIZE`          | `VectorizeIndex`         | `vectorize`         | ⚠️ `remote: true`     |
  | `AI`                 | `Ai`                     | `ai`                | ⚠️ `remote: true`     |
  | `BROWSER`            | `Fetcher`                | `browser`           | ⚠️ Remote only         |
  | `LONG_RATE_LIMITER`  | `RateLimit`              | `ratelimits`        | ✅ Local via Wrangler  |
  | `SHORT_RATE_LIMITER` | `RateLimit`              | `ratelimits`        | ✅ Local via Wrangler  |
  | `ASSETS`             | `Fetcher`                | `assets`            | ✅ Local via Wrangler  |

  > **Note:** `VECTORIZE` and `AI` use `remote: true` — they require an active Cloudflare account even during local development (`wrangler dev`). Ensure bindings are provisioned before testing these features.

# Per-artifact rules
# These rules are injected into the AI context when working on specific artifacts.
rules:
  proposal:
    - "Focus on the 'Why' and user value"
    - "Keep proposals under 500 words"
    - "Always include a 'Non-goals' section"
    - "Define success metrics"
    - "Reference Cloudflare service selection guide for infrastructure decisions"

  design:
    - "Focus on the 'How' and architecture"
    - "Include sequence diagrams for complex flows"
    - "Address edge cases and error handling"
    - "Verify security implications (CSRF, CORS, Auth, Rate Limiting)"
    - "Consider performance impacts (bundle size, cold start, query efficiency)"
    - "Follow clean architecture layers (Routes → Engine → Service)"
    - "Specify which Cloudflare services are used and why"
    - "Include accessibility considerations (ARIA, keyboard nav)"

  tasks:
    - "Break tasks into atomic, verifiable chunks (max 2 hours)"
    - "Include file paths and command examples"
    - "Specify test coverage requirements (unit, integration, E2E) — minimum 90% enforced"
    - "Define clear acceptance criteria"
    - "Include i18n translation key additions when UI text changes"
    - "Reference DaisyUI components and TailwindCSS patterns for UI tasks"
    - "E2E test tasks MUST specify the `from Playwright-E2E` data prefix convention"

  spec:
    - "Must be the source of truth for the capability"
    - "Keep it up-to-date with implementation"
    - "Reference design decisions"
    - "Document API endpoints with Zod schema references"
    - "Include Cloudflare binding dependencies"
    - "Document accessibility requirements met"
    - "Document CSRF and CORS behavior for all mutation endpoints"
    - "Document E2E test data prefix convention adherence"
